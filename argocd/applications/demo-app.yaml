apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
  finalizers:
    - argoproj.io/resources-finalizer 
spec:
  # ссылка на ресурс AppProject, который определяет политики и ограничения для этого приложения.
  project: development 
  # источник деплоя
  source:
    repoURL: https://github.com/softaav325/argo.git
    targetRevision: main                                      
    path: chart # либо k8s - папка с yml

    helm:
      # Extra parameters to set (same as setting through values.yaml, but these take precedence)
      parameters:
      - name: "service.port"
        value: "80"
      # - name: "replicaCount"
      #   value: "4"
    # Helm values files for overriding values in the helm chart
    # The path is relative to the spec.source.path directory defined above
      valueFiles:
      - ../values/values-demo.yaml

      # Values file as block file - либо так
      values: |
        serviceAccount:
          create: true
          annotations:
            demo/role: demo-annotation
          name: sa-custom-name

  # Destination cluster and namespace to deploy the application
  destination:
    server: https://kubernetes.default.svc
    # в каком неймспес будет развернуто
    namespace: demo 

  # Sync policy
  syncPolicy:
    automated:
      prune: true # синхронизирует кубер с репозиторием, разрешаем удалять/добавлять ресурсы
      selfHeal: true # позволяет изменять (argo не восстанавливает изменения)
    syncOptions:
    - CreateNamespace=true     # создается неймспес, если его нет
